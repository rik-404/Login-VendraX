<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueci a Senha - VendraX</title>
    <link rel="stylesheet" href="./login.css">
    <link rel="stylesheet" href="./forgot.css">
</head>
<body>
    <main class="login-container">
        <div class="top-nav">
            <a href="./index.html" class="back-link-top">← Voltar aos perfis</a>
        </div>
        
        <div class="login-card forgot-card">
            <div class="forgot-header">
                <h1>Esqueci a senha</h1>
                <p class="forgot-description">Digite seu email para receber instruções de redefinição de senha</p>
            </div>
            
            <form id="forgot-form" onsubmit="handleForgotPassword(event)">
                <div class="input-group">
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="Email cadastrado" 
                        required
                        aria-label="Email"
                    >
                </div>
                
                <button type="submit" class="login-btn forgot-btn">
                    Enviar instruções
                </button>
                
                <div class="form-links">
                    <a href="./login.html" class="back-link">← Voltar ao login</a>
                </div>
            </form>
        </div>
    </main>
    
    <script src="./forgot.js"></script>
</body>
</html>
