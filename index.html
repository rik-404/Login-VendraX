<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VendraX</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Quem esta logando?</h1>
        <section aria-label="Perfis disponíveis">
            <nav class="profiles">
                <ul>
                    <li>
                        <a href="login.html?image=/assets/perfil-1.jpg&name=MC%20Ratão" class="profile">
                            <figure>
                                <img src="/assets/perfil-1.jpg" alt="Perfil do usuário MC Ratão com estilo personalizado">
                                <figcaption>MC Ratão</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="login.html?image=/assets/perfil-2.jpg&name=Rato%20Albino" class="profile">
                            <figure>
                                <img src="/assets/perfil-2.jpg" alt="Perfil do usuário Rato Albino">
                                <figcaption>Rato Albino</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="login.html?image=/assets/perfil-3.jpg&name=Ratão%20do%20banhado" class="profile">
                            <figure>
                                <img src="/assets/perfil-3.jpg" alt="Perfil do usuário Ratão do banhado">
                                <figcaption>Ratão do banhado</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="login.html?image=/assets/perfil-4.jpg&name=Ratazana%20de%20esgoto" class="profile">
                            <figure>
                                <img src="/assets/perfil-4.jpg" alt="Perfil do usuário Ratazana de esgoto">
                                <figcaption>Ratazana de esgoto</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="profile add-profile">
                            <figure>
                                <div class="add-icon">+</div>
                                <figcaption>Criar conta</figcaption>
                            </figure>
                        </a>
                    </li>
                </ul>
            </nav>
        </section>
    </main>
</body>
</html>
